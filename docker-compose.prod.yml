services:
  mysql:
    image: mysql:8.0
    container_name: yugioh-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yugioh_db}
      MYSQL_USER: ${MYSQL_USER:-yugioh_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set in .env}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=1G
      - --max-connections=200
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    # `build:` kept so `docker compose build` works locally; in prod the
    # VPS runs `docker compose pull` which uses `image:` only. Image is
    # pushed from the laptop via `docker buildx ... --push`.
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/efran-frenta23/yugioh-app:latest
    container_name: yugioh-app
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - "80:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "mysql://${MYSQL_USER:-yugioh_user}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-yugioh_db}?connection_limit=10&pool_timeout=20"
      ORIGIN: ${ORIGIN:?set in .env}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-512K}
      PORT: 3000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal

volumes:
  mysql_data:

networks:
  internal:
    driver: bridge
