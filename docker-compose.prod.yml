services:
  mysql:
    image: mysql:8.0
    container_name: yugioh-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yugioh_db}
      MYSQL_USER: ${MYSQL_USER:-yugioh_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set in .env}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=1G
      - --max-connections=200
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: yugioh-app:latest
    container_name: yugioh-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: "mysql://${MYSQL_USER:-yugioh_user}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-yugioh_db}?connection_limit=10&pool_timeout=20"
      ORIGIN: ${ORIGIN:?set in .env}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-512K}
      PORT: 3000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal
      - web

  caddy:
    image: caddy:2-alpine
    container_name: yugioh-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:?set in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web

volumes:
  mysql_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
